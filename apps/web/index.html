<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no"
    />
    <meta name="theme-color" content="#FBF1E4" />
    <meta name="description" content="Habits that help you return to yourself." />
    <!-- Installed (home-screen) PWA behaviour: true standalone with a
         translucent status bar, so safe-area insets and the dynamic viewport
         report correctly and the inner scroller stays the right height. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Harmony" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/icons/icon-192.png" type="image/png" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <title>Harmony</title>
  </head>
  <body>
    <!-- Pre-React boot cover: just the app icon on the theme's paper, so the
         first paint (and the paint after an update reload) shows a calm launch
         screen, not a blank flash. No "Updating" wording here — that belongs to
         the in-app update screen, which only appears on an actual new version.
         main.tsx removes this once React is up. -->
    <div
      id="boot-splash"
      style="position:fixed;inset:0;z-index:90;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--parchment-100,#FBF1E4)"
    >
      <img
        src="/icons/icon-192.png"
        width="80"
        height="80"
        alt=""
        style="border-radius:20px;box-shadow:0 1px 3px rgba(35,25,15,0.08)"
      />
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
